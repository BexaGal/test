---
apiVersion: v1
kind: Service
metadata:
  name: to-nginx
spec:
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: http-web-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: docker.io/nginx:1.29
        ports:
        - containerPort: 80
          name: http-web-svc
        envFrom:
          - secretRef:
              name: test1
          - secretRef:
              name: test2
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
      terminationGracePeriodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-deployment
  minReplicas: 1
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 200
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Value
        averageUtilization: 70
---
apiVersion: gateway.networking.k8s.io/v1s
kind: Gateway
metadata:
  name: nginx-gateway
spec:
  gatewayClassName: home-gateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-route
spec:
  parentRefs:
  - name: nginx-gateway
  hostnames:
  - "nginx.local"
  rules:
  - backendRefs:
    - name: to-nginx
      port: 80